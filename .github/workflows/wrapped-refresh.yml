name: Refresh Bundestag Wrapped data

# Regenerates the pre-computed Bundestag-Wrapped datasets (apps/wrapped/public/*.json)
# from the public MCP server and commits them. bundestag-wrapped (Coolify, GitHub-App
# connected to main) auto-deploys on the resulting push, so the site picks up fresh data.
#
# Runs weekly, and on demand via "Run workflow".

on:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC
  workflow_dispatch:
    inputs:
      wahlperiode:
        description: 'Wahlperiode to analyze'
        default: '21'
        required: false

permissions:
  contents: write

concurrency:
  group: wrapped-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install analysis package + spaCy model
        run: |
          python -m pip install --upgrade pip
          pip install -e services/analysis
          pip install "https://github.com/explosion/spacy-models/releases/download/de_core_news_lg-3.8.0/de_core_news_lg-3.8.0-py3-none-any.whl"

      - name: Regenerate datasets from the public MCP
        working-directory: services/analysis
        env:
          WP: ${{ github.event.inputs.wahlperiode || '21' }}
          MCP_SERVER: https://mcp.bundestag-wrapped.de
        run: |
          set -euo pipefail
          bundestag-analysis --server "$MCP_SERVER" download ./data -w "$WP"
          bundestag-analysis parse ./data
          bundestag-analysis analyze ./data -w "$WP" -o ./results -q
          bundestag-analysis export-all ./data -r ./results -o "$GITHUB_WORKSPACE/apps/wrapped/public"

      - name: Commit refreshed datasets (only if changed)
        run: |
          set -euo pipefail
          git config user.name "wrapped-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/wrapped/public
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          SITZUNGEN=$(python -c "import json;print(json.load(open('apps/wrapped/public/wrapped.json'))['metadata']['sitzungen'])")
          git commit -m "chore(data): refresh Bundestag Wrapped datasets (Sitzung ${SITZUNGEN}) [skip ci]"
          git push
