# Dependency Review — blocks PRs that introduce vulnerable or disallowed deps.
# Diffs the manifests/lockfiles changed in a PR against the advisory database.
name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the summary comment
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # Fail the PR on high-or-worse vulnerabilities in newly-added deps.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
