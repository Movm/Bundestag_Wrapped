name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo (no write scopes on GITHUB_TOKEN).
permissions:
  contents: read

jobs:
  js:
    name: JS/TS workspace (lint · test · build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22 = local/dev floor; 26 = the version the Dockerfiles ship (node:26-slim).
        # Testing both keeps CI honest about what actually runs in production — a
        # node-version-specific break (e.g. corepack removed in node >=25) surfaces
        # here instead of only at the Coolify deploy.
        node-version: [22, 26]
    steps:
      - uses: actions/checkout@v7

      # Version comes from the root package.json "packageManager" field (pnpm@10.0.0)
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build web
        run: pnpm --filter bundestag-wrapped build

  python:
    name: Python analysis (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analysis
    strategy:
      fail-fast: false
      matrix:
        # 3.11 = the requires-python floor; 3.13 = the version Dockerfile.api ships.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev)
        run: pip install -e ".[dev]"

      - name: Test
        # Parser/aggregation tests don't require the spaCy model download.
        run: pytest -q

  docker:
    name: Docker image build (no push)
    runs-on: ubuntu-latest
    # Build the three images in parallel — the analysis image (build-essential
    # compile + 610 MB spaCy download) dominates wall time, so a matrix runs it
    # concurrently with the two fast node builds instead of serially after them.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: wrapped
            context: ./apps/wrapped
            file: ./apps/wrapped/Dockerfile
          - name: mcp
            context: ./services/mcp
            file: ./services/mcp/Dockerfile
          - name: analysis
            context: ./services/analysis
            file: ./services/analysis/Dockerfile.api
    steps:
      - uses: actions/checkout@v7

      # Coolify builds each image from its OWN directory as the build context
      # (base_directory), so `context`/`file` mirror that here. This job catches
      # breakage the unit tests can't: a bad base-image bump, a removed build tool
      # (corepack), a stale hardcoded path (python3.<minor>/site-packages), a
      # Dockerfile syntax error — all of which otherwise only fail at deploy,
      # leaving main un-deployable.
      - uses: docker/setup-buildx-action@v3

      # A plain `docker build` on a fresh runner has NO cross-run cache, so the
      # analysis image would re-download the 610 MB spaCy model every run. The gha
      # cache backend persists layers between runs (per-image scope so they don't
      # collide); only a changed layer rebuilds.
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          tags: ci/bundestag-${{ matrix.name }}:pr
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
