name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo (no write scopes on GITHUB_TOKEN).
permissions:
  contents: read

jobs:
  js:
    name: JS/TS workspace (lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Version comes from the root package.json "packageManager" field (pnpm@10.0.0)
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build web
        run: pnpm --filter bundestag-wrapped build

  python:
    name: Python analysis (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analysis
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install (dev)
        run: pip install -e ".[dev]"

      - name: Test
        # Parser/aggregation tests don't require the spaCy model download.
        run: pytest -q
