name: Dependabot auto-merge

# Enables GitHub native auto-merge for LOW-RISK Dependabot PRs (patch + minor).
# The PR still has to pass every required check first — auto-merge only fires once
# CI is green. Majors are never auto-merged: they land in the queue for a human to
# review. Requires the repo setting "Allow auto-merge" (Settings → General) and a
# branch-protection rule with required status checks.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch + minor
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
